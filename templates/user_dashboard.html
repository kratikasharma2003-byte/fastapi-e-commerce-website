<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #f5f6fa;
    }

    .navbar {
        background: linear-gradient(90deg, #1e1e2f, #2a2a4a);
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        padding: 8px 15px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .nav-links a:hover {
        background: #6c63ff;
    }

    .container {
        padding: 40px;
    }

    h1 {
        margin-bottom: 20px;
    }

    .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        margin-bottom: 10px;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 20px;
        background: #6c63ff;
        color: white;
        border-radius: 8px;
        text-decoration: none;
    }

    .logout {
        background: #ff4d4d;
    }
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🛍 ShopFast</div>
    <div class="nav-links">
        <a href="#">My Account</a>
        <a href="/shop">Shop</a>
        <!-- <a href="/cart">Cart</a> -->
        <a href="/logout" class="logout">Logout</a>
    </div>
</div>

<div class="container">
    <h1 id="welcomeText">Welcome 👋</h1>

    <div class="card-container">

        <div class="card" onclick="goTo('/shop')">
            <h3>🛒 Shop Products</h3>
            <p>Browse and buy items</p>
            <div class="btn">Go to Shop</div>
        </div>

        <!--
        <div class="card" onclick="goTo('/cart')">
            <h3>📦 View Cart</h3>
            <p>Check your selected items</p>
            <div class="btn">Open Cart</div>
        </div>

        <div class="card" onclick="goTo('/orders')">
            <h3>📃 My Orders</h3>
            <p>Track your purchases</p>
            <div class="btn">View Orders</div>
        </div>

        <div class="card" onclick="goTo('/profile')">
            <h3>👤 Profile</h3>
            <p>Manage your account</p>
            <div class="btn">Edit Profile</div>
        </div>
        -->

    </div>
</div>

<script>
function goTo(path) {
    window.location.href = path;
}

/* ✅ Dynamic Username (Example) */
let username = localStorage.getItem("username") || "User";
document.getElementById("welcomeText").innerText = "Welcome, " + username + " 👋";
</script>

</body>
</html>
