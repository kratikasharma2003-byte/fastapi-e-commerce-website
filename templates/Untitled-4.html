<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Cancelled | ShopFast</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #ff6a6a, #ffb347);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 60px;
            color: #dc3545;
        }

        h2 {
            margin-top: 10px;
            color: #333;
        }

        p {
            color: #666;
            margin: 15px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #ff6a6a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #dc3545;
        }

        .secondary-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .secondary-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">❌</div>

    <h2>Payment Cancelled</h2>
    <p>Your payment was not completed.</p>
    <p>You can try again or continue shopping.</p>

    <a href="/shop" class="btn">Try Again</a>
    <br>
    <a href="/" class="secondary-btn">Go to Home</a>
</div>

</body>
</html>
