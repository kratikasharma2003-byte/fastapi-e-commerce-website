<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg, #4facfe, #00f2fe);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
}
.error { color: red; font-size: 12px; }
.message { color: green; text-align:center; }
button { width:100%; padding:10px; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
<h2>Register</h2>

<input id="username" placeholder="Username"><div id="usernameError" class="error"></div>
<input id="email" placeholder="Email"><div id="emailError" class="error"></div>
<input id="password" type="password" placeholder="Password"><div id="passwordError" class="error"></div>
<input id="confirm_password" type="password" placeholder="Confirm Password"><div id="confirmError" class="error"></div>
<input id="phone" placeholder="Phone"><div id="phoneError" class="error"></div>
<input id="dob" type="date"><div id="dobError" class="error"></div>

<select id="gender">
<option value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
<div id="genderError" class="error"></div>

<button onclick="register()" id="btn">Register</button>

<div id="msg" class="message"></div>
<div id="err" class="error"></div>

</div>

<script>
const API = "https://new-fastapi-e-commerce-website.onrender.com";

// wake server
fetch(API + "/products").catch(()=>{});

async function register() {

const data = {
    username: username.value.trim(),
    email: email.value.trim(),
    password: password.value,
    phone: phone.value.trim(),
    dob: dob.value,
    gender: gender.value
};

// ❗ DO NOT send confirm_password to backend
if (password.value !== confirm_password.value) {
    confirmError.innerText = "Passwords do not match";
    return;
}

btn.disabled = true;
btn.innerText = "Registering...";

try {
    const res = await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
        msg.innerText = "✅ Registered!";
        setTimeout(()=> location.href="/login",1000);
    } else {
        err.innerText = result.detail || "Error";
    }

} catch(e) {
    err.innerText = "Server waking up... try again in 20 sec";
}

btn.disabled = false;
btn.innerText = "Register";
}
</script>

</body>
</html>
