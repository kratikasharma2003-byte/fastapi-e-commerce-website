<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled — ShopFast</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family:'DM Sans',sans-serif; background:linear-gradient(135deg,#fff5f5 0%,#f7f8fc 60%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .card { background:#fff; border-radius:24px; padding:48px 40px; max-width:440px; width:100%; text-align:center; box-shadow:0 8px 48px rgba(214,48,49,0.10); animation:slideUp .4s ease; }
        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
        .icon-wrap { width:88px; height:88px; background:linear-gradient(135deg,#d63031,#e17055); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; box-shadow:0 8px 28px rgba(214,48,49,.28); animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .15s both; }
        @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
        .icon-wrap svg { width:44px; height:44px; }
        h1 { font-family:'Sora',sans-serif; font-size:24px; font-weight:700; color:#1a1a2e; margin-bottom:8px; }
        .sub { color:#888; font-size:14px; margin-bottom:28px; line-height:1.7; }
        .reason-box { background:#fff5f5; border:1px solid #ffd5d5; border-radius:12px; padding:14px 18px; margin-bottom:24px; font-size:13px; color:#c0392b; display:none; }
        .reason-box.show { display:block; }
        .btn { display:block; width:100%; padding:14px; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; text-decoration:none; text-align:center; transition:opacity .2s,transform .15s; margin-bottom:10px; }
        .btn:hover { opacity:.88; transform:translateY(-1px); }
        .btn-primary { background:linear-gradient(135deg,#635bff,#8b7fff); color:#fff; box-shadow:0 4px 18px rgba(99,91,255,.30); }
        .btn-outline { background:transparent; color:#635bff; border:2px solid #635bff; }
        .btn-danger  { background:linear-gradient(135deg,#d63031,#e17055); color:#fff; box-shadow:0 4px 18px rgba(214,48,49,.25); }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 13L31 31M31 13L13 31" stroke="white" stroke-width="4" stroke-linecap="round"/>
        </svg>
    </div>
    <h1>Payment Cancelled</h1>
    <p class="sub" id="sub-text">
        Your payment was not completed. Your order has been saved and your cart is still intact.
        You can try again anytime.
    </p>

    <!-- Reason box (shown when server provides a reason) -->
    <div class="reason-box" id="reason-box">
        <!-- filled by JS -->
    </div>

    <button class="btn btn-danger" onclick="retryPayment()">🔄 Try Again</button>
    <a href="/cart-page" class="btn btn-primary">🛒 Return to Cart</a>
    <a href="/shop"      class="btn btn-outline">🛍️ Continue Shopping</a>
</div>

<script>
    // Reason injected by Jinja2 (from FastAPI /stripe/cancel-page?reason=...)
    const SERVER_REASON = "{{ reason if reason else '' }}";

    const params       = new URLSearchParams(window.location.search);
    const reason       = SERVER_REASON || params.get("reason") || "";

    const REASON_LABELS = {
        "stripe_error":    "There was a problem connecting to Stripe. Please try again.",
        "not_paid":        "The payment was not completed. Please try again.",
        "missing_order_id":"Your session expired. Please place your order again.",
        "order_not_found": "Your order could not be found. Please contact support.",
        "db_error":        "A server error occurred. Your payment may not have been processed.",
    };

    if (reason) {
        const box = document.getElementById("reason-box");
        box.textContent = "ℹ️  " + (REASON_LABELS[reason] || `Error: ${reason}`);
        box.classList.add("show");
    }

    function retryPayment() {
        window.location.href = "/shop";
    }
</script>
</body>
</html>
