<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
h2 {
    text-align: center;
    margin-bottom: 6px;
    color: #1a1a2e;
}
.subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
}
label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 4px;
    font-weight: bold;
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 14px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
    box-sizing: border-box;
}
input:focus {
    outline: none;
    border-color: #4facfe;
}
button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}
button:hover { background: #0077ff; }
.message { text-align: center; margin-top: 10px; color: green; font-size: 13px; }
.error   { text-align: center; margin-top: 10px; color: red;   font-size: 13px; }
.back    { text-align: center; margin-top: 12px; font-size: 13px; }
.back a  { color: #4facfe; text-decoration: none; }
.back a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <h2>Verify OTP</h2>
    <p class="subtitle">Enter the 6-digit code sent to your email.</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label for="otp">OTP Code</label>
    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">

    <button onclick="verifyOtp()">Verify OTP</button>

    <div class="message" id="msg"></div>
    <div class="error"   id="err"></div>

    <div class="back"><a href="/forgot-password">← Back</a></div>
</div>

<script>
const email = sessionStorage.getItem('reset_email') || '';
if (email) document.getElementById('email').value = email;

async function verifyOtp() {
    const email = document.getElementById('email').value.trim();
    const otp   = document.getElementById('otp').value.trim();
    const msg   = document.getElementById('msg');
    const err   = document.getElementById('err');

    msg.innerText = '';
    err.innerText = '';

    if (!email || !otp) {
        err.innerText = 'Please fill in all fields.';
        return;
    }

    try {
        const res  = await fetch('/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
        });
        const data = await res.json();

        if (res.ok) {
            sessionStorage.setItem('reset_email', email);
            sessionStorage.setItem('otp_verified', 'true');
            msg.innerText = 'OTP verified! Redirecting...';
            setTimeout(() => window.location.href = '/reset-password', 1500);
        } else {
            err.innerText = data.detail || 'Invalid or expired OTP.';
        }
    } catch {
        err.innerText = 'Server error. Please try again.';
    }
}
</script>

</body>
</html>
