<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
h2 {
    text-align: center;
    margin-bottom: 6px;
    color: #1a1a2e;
}
.subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
}
label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 4px;
    font-weight: bold;
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 14px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
    box-sizing: border-box;
}
input:focus {
    outline: none;
    border-color: #4facfe;
}
button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}
button:hover { background: #0077ff; }
.message { text-align: center; margin-top: 10px; color: green; font-size: 13px; }
.error   { text-align: center; margin-top: 10px; color: red;   font-size: 13px; }
.back    { text-align: center; margin-top: 12px; font-size: 13px; }
.back a  { color: #4facfe; text-decoration: none; }
.back a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your new password below.</p>

    <label for="new_password">New Password</label>
<div style="position: relative;">
    <input type="password" id="new_password" placeholder="Enter new password" style="padding-right: 40px;">
    <span onclick="togglePassword('new_password')" 
          style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
        👁️
    </span>
</div>

    <label for="confirm_password">Confirm Password</label>
    <div style="position: relative;">
    <input type="password" id="confirm_password" placeholder="Confirm new password">
     <span onclick="togglePassword('confirm_password')" 
              style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
            👁️
        </span>
    </div>

    <button onclick="resetPassword()">Reset Password</button>

    <div class="message" id="msg"></div>
    <div class="error"   id="err"></div>

    <div class="back"><a href="/verify-otp">← Back</a></div>
</div>

<script>
const email    = sessionStorage.getItem('reset_email')  || '';
const verified = sessionStorage.getItem('otp_verified') || '';

if (!email || !verified) {
    window.location.href = '/forgot-password';
}

async function resetPassword() {
    const newPwd  = document.getElementById('new_password').value;
    const confPwd = document.getElementById('confirm_password').value;
    const msg     = document.getElementById('msg');
    const err     = document.getElementById('err');

    msg.innerText = '';
    err.innerText = '';

    if (!newPwd || !confPwd) {
        err.innerText = 'Please fill in all fields.';
        return;
    }

    if (newPwd !== confPwd) {
        err.innerText = 'Passwords do not match.';
        return;
    }

    try {
        const res  = await fetch('/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email,
                new_password:     newPwd,
                confirm_password: confPwd
            })
        });
        const data = await res.json();

        if (res.ok) {
            sessionStorage.removeItem('reset_email');
            sessionStorage.removeItem('otp_verified');
            msg.innerText = 'Password reset! Redirecting to login...';
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            err.innerText = data.detail || 'Reset failed. Try again.';
        }
    } catch {
        err.innerText = 'Server error. Please try again.';
    }
}

function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
