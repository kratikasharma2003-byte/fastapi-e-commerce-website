<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopFast — Order Confirmed</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee; --surface: #fff; --border: #e2ddd5;
    --text: #1a1814; --muted: #7a7670; --success: #1a7a4a; --accent2: #5a4fcf;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }

  .success-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,.08);
  }

  .checkmark-wrap {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #e8f7ef;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    animation: pop .5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .checkmark { stroke: var(--success); stroke-width: 2.5; fill: none; stroke-dasharray: 40; stroke-dashoffset: 40; animation: draw .4s .3s ease forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; margin-bottom: .5rem; letter-spacing: -0.03em; }
  .subtitle { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; }

  .order-meta {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }
  .meta-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.88rem; }
  .meta-row .label { color: var(--muted); }
  .meta-row .val { font-weight: 500; }
  .meta-row .val.success { color: var(--success); }

  .items-list { margin-bottom: 1.5rem; text-align: left; }
  .order-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .order-item:last-child { border-bottom: none; }
  .order-item-name { flex: 1; color: var(--text); }
  .order-item-qty { color: var(--muted); margin: 0 12px; }
  .order-item-price { font-weight: 500; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  .total-row { display: flex; justify-content: space-between; padding: 4px 0; font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }

  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-primary {
    padding: 13px; border-radius: 12px; background: var(--text); color: #fff;
    border: none; font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; text-decoration: none; display: block; text-align: center;
    transition: background .2s;
  }
  .btn-primary:hover { background: #2d2b26; }
  .btn-outline {
    padding: 13px; border-radius: 12px; background: none; color: var(--text);
    border: 1px solid var(--border); font-size: 0.88rem; font-weight: 500;
    cursor: pointer; text-decoration: none; display: block; text-align: center;
    transition: background .2s;
  }
  .btn-outline:hover { background: var(--bg); }

  .email-note { font-size: 0.78rem; color: var(--muted); margin-top: 1rem; }
  .loading-state { color: var(--muted); font-size: 0.9rem; padding: 1rem; }
</style>
</head>
<body>

<div class="success-card">
  <div class="checkmark-wrap">
    <svg width="36" height="36" viewBox="0 0 24 24">
      <polyline class="checkmark" points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>Order Confirmed!</h1>
  <p class="subtitle" id="subtitle">Your order has been placed successfully. We'll send you a confirmation email shortly.</p>

  <div class="order-meta" id="orderMeta">
    <div class="loading-state">Loading order details…</div>
  </div>

  <div class="items-list" id="itemsList" style="display:none"></div>

  <div class="actions">
    <a href="/shop" class="btn-primary">Continue Shopping</a>
    <a href="/dashboard" class="btn-outline" id="ordersLink">View My Orders</a>
  </div>

  <p class="email-note" id="emailNote"></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const orderId = params.get('order_id');
const userEmail = localStorage.getItem('user_email') || sessionStorage.getItem('user_email') || '';

async function loadOrder() {
  if (!orderId || !userEmail) {
    renderFallback();
    return;
  }
  try {
    const res = await fetch(`/orders/${orderId}?email=${encodeURIComponent(userEmail)}`);
    if (!res.ok) throw new Error();
    const order = await res.json();
    renderOrder(order);
  } catch {
    renderFallback();
  }
}

function renderOrder(order) {
  const meta = document.getElementById('orderMeta');
  const statusColor = order.status === 'Paid' ? 'success' : '';
  meta.innerHTML = `
    <div class="meta-row"><span class="label">Order ID</span><span class="val">#${order.order_id}</span></div>
    <div class="meta-row"><span class="label">Status</span><span class="val ${statusColor}">${order.status}</span></div>
    <div class="meta-row"><span class="label">Date</span><span class="val">${new Date(order.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}</span></div>
    <div class="meta-row"><span class="label">Total</span><span class="val">₹${order.total.toFixed(2)}</span></div>
  `;

  const itemsList = document.getElementById('itemsList');
  itemsList.style.display = 'block';
  itemsList.innerHTML = `
    <p style="font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:8px">Items</p>
    ${order.items.map(i => `
      <div class="order-item">
        <span class="order-item-name">${i.product_name}</span>
        <span class="order-item-qty">×${i.quantity}</span>
        <span class="order-item-price">₹${i.subtotal.toFixed(2)}</span>
      </div>
    `).join('')}
    <hr class="divider">
    <div class="total-row"><span>Total</span><span>₹${order.total.toFixed(2)}</span></div>
  `;

  if (userEmail) {
    document.getElementById('emailNote').textContent = `Confirmation sent to ${userEmail}`;
  }
}

function renderFallback() {
  document.getElementById('orderMeta').innerHTML = `
    <div class="meta-row"><span class="label">Status</span><span class="val" style="color:var(--success)">Confirmed</span></div>
    <div class="meta-row"><span class="label">Order ID</span><span class="val">${orderId ? '#' + orderId : 'Processing…'}</span></div>
  `;
}

loadOrder();
</script>
</body>
</html>
